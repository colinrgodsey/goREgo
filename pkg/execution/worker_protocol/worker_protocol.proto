syntax = "proto3";

package worker_protocol;

option go_package = "github.com/colinrgodsey/goREgo/pkg/execution/worker_protocol";

// An input file for a work request.
message Input {
  // The path in the file system where to read this input artifact from.
  string path = 1;

  // A hash-value of the contents. The format of the contents is unspecified and
  // the digest should be treated as an opaque token.
  bytes digest = 2;
}

// A single work unit sent to a persistent worker process.
// Matches the Bazel persistent worker wire protocol.
message WorkRequest {
  // Command-line arguments for the work unit.
  repeated string arguments = 1;

  // The inputs that the worker is allowed to read during execution.
  repeated Input inputs = 2;

  // Unique request identifier. 0 means singleplex (one request at a time).
  int32 request_id = 3;

  // When true, this is a cancel request for a previously sent WorkRequest
  // with the same request_id.
  bool cancel = 4;

  // Verbosity level. Greater than 0 enables extra debug output.
  int32 verbosity = 5;

  // The relative directory inside the worker's working directory where inputs
  // and outputs are placed, for sandboxing purposes.
  string sandbox_dir = 6;
}

// Response from a persistent worker process after completing a work unit.
// Matches the Bazel persistent worker wire protocol.
message WorkResponse {
  // Exit code of the work unit. 0 means success.
  int32 exit_code = 1;

  // Combined stdout/stderr output from the work unit.
  string output = 2;

  // Must match the request_id of the WorkRequest this is a response to.
  int32 request_id = 3;

  // When true, indicates the request was cancelled.
  bool was_cancelled = 4;
}
